# ===================================================================
# DEFAULT CONFIG (Applies to ALL profiles unless overridden)
# ===================================================================
spring:
  application:
    name: edusync
  profiles:
    active: dev
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:no-reply@shikshaintelligence.com}

  # --- JPA / Hibernate Common Settings ---
  jpa:
    hibernate:
      # SECURITY FIX: Changed from 'update' to 'validate' as a safe default.
      # 'update' can silently alter/corrupt the schema in production.
      # Profile-specific overrides are defined below.
      ddl-auto: validate
    # SECURITY FIX: Disabled by default to prevent SQL query leakage in logs.
    # Enabled only in the 'dev' profile override below.
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# APPLICATION-SPECIFIC PROPERTIES
# ===================================================================
app:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expirationTime: ${JWT_EXPIRATION_TIME}
    refresh-expirationTime: ${REFRESH_EXPIRATION_TIME}
    password-reset-expirationTime: ${PASSWORD_RESET_TIME}

  frontend:
    url: ${APP_FRONTEND_URL}

  # SECURITY FIX: Moved from root 'security' namespace to 'app.security'
  # to avoid conflict with Spring Security's reserved property namespace.
  security:
    max-devices: 2

# NOTE: 'api.url' is kept at the root namespace as it is referenced
# directly via @RequestMapping("${api.url}/...") across all controllers.
api:
  url: ${BASE_URL}${API_VERSION}

---
# ===================================================================
# DEVELOPMENT PROFILE (Active when spring.profiles.active=dev)
# ===================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}?prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASS}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 30000

  jpa:
    # Allowed only in dev: auto-syncs entity changes to the DB schema.
    hibernate:
      ddl-auto: validate
    # Enabled only in dev for debugging SQL queries.
    show-sql: true

---
# ===================================================================
# PRODUCTION PROFILE (Active when spring.profiles.active=prod)
# ===================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}?prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PASS}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    # SECURITY: 'validate' ensures schema matches entities without altering it.
    hibernate:
      ddl-auto: validate
    show-sql: false

# SECURITY: Enforce HTTPS in production.
server:
  ssl:
    enabled: true
